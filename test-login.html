<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Job Agent — Auth Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f14;
      color: #e2e2e8;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 48px 24px;
      gap: 32px;
    }
    h1 { font-size: 1.5rem; color: #6366f1; }
    .card {
      background: #1a1a24;
      border: 1px solid #2a2a38;
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 520px;
    }
    .card h2 { font-size: 1rem; margin-bottom: 16px; color: #a0a0b8; }
    button {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    .btn-linkedin { background: #0077b5; color: #fff; }
    .btn-google   { background: #fff; color: #333; }
    .btn-action   { background: #6366f1; color: #fff; }
    .btn-danger   { background: #dc2626; color: #fff; }
    label { display: block; font-size: 0.8rem; color: #a0a0b8; margin-bottom: 4px; }
    input {
      width: 100%;
      background: #0f0f14;
      border: 1px solid #2a2a38;
      border-radius: 6px;
      color: #e2e2e8;
      padding: 8px 12px;
      font-size: 0.9rem;
      margin-bottom: 12px;
    }
    pre {
      background: #0f0f14;
      border: 1px solid #2a2a38;
      border-radius: 8px;
      padding: 16px;
      font-size: 0.78rem;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      min-height: 60px;
      color: #6ee7b7;
      max-height: 300px;
      overflow-y: auto;
    }
    .status {
      font-size: 0.8rem;
      padding: 6px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
    }
    .status.ok  { background: #064e3b; color: #6ee7b7; }
    .status.err { background: #7f1d1d; color: #fca5a5; }
    .row { display: flex; gap: 10px; }
    .row button { flex: 1; }
  </style>
</head>
<body>
  <h1>Job Agent — Auth Test</h1>

  <!-- OAuth Login -->
  <div class="card">
    <h2>1. Login with OAuth</h2>
    <button class="btn-linkedin" onclick="loginLinkedIn()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"/></svg>
      Continue with LinkedIn
    </button>
    <button class="btn-google" onclick="loginGoogle()">
      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </div>

  <!-- Token from callback -->
  <div class="card">
    <h2>2. Paste tokens (from redirect URL after login)</h2>
    <label>Access Token (JWT)</label>
    <input id="accessToken" type="text" placeholder="Paste accessToken from URL..." />
    <label>Refresh Token</label>
    <input id="refreshToken" type="text" placeholder="Paste refreshToken from URL..." />
    <div class="row">
      <button class="btn-action" onclick="getMe()">GET /auth/me</button>
      <button class="btn-action" onclick="doRefresh()">POST /auth/refresh</button>
      <button class="btn-danger" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <!-- Response -->
  <div class="card">
    <h2>3. Response</h2>
    <div id="status"></div>
    <pre id="output">Waiting for request...</pre>
  </div>

  <script>
    const API = 'http://localhost:3001';

    function loginLinkedIn() {
      window.open(`${API}/auth/linkedin`, '_self');
    }
    function loginGoogle() {
      window.open(`${API}/auth/google`, '_self');
    }

    // Auto-extract tokens from URL after OAuth redirect
    (function extractTokensFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const at = params.get('accessToken');
      const rt = params.get('refreshToken');
      const err = params.get('error');
      if (at) {
        document.getElementById('accessToken').value = at;
        document.getElementById('refreshToken').value = rt || '';
        showResult({ accessToken: at, refreshToken: rt }, true);
        window.history.replaceState({}, '', window.location.pathname);
      }
      if (err) {
        showResult({ error: err }, false);
      }
    })();

    function showResult(data, ok) {
      const statusEl = document.getElementById('status');
      statusEl.className = `status ${ok ? 'ok' : 'err'}`;
      statusEl.textContent = ok ? '✓ Success' : '✗ Error';
      document.getElementById('output').textContent = JSON.stringify(data, null, 2);
    }

    async function apiCall(path, options = {}) {
      const token = document.getElementById('accessToken').value.trim();
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers['Authorization'] = `Bearer ${token}`;
      try {
        const res = await fetch(`${API}${path}`, { ...options, headers });
        const data = await res.json().catch(() => ({ status: res.status }));
        showResult(data, res.ok);
      } catch (err) {
        showResult({ error: String(err) }, false);
      }
    }

    function getMe() {
      apiCall('/auth/me');
    }
    function doRefresh() {
      const rt = document.getElementById('refreshToken').value.trim();
      apiCall('/auth/refresh', {
        method: 'POST',
        body: JSON.stringify({ refreshToken: rt }),
      });
    }
    function doLogout() {
      const rt = document.getElementById('refreshToken').value.trim();
      apiCall('/auth/logout', {
        method: 'POST',
        body: JSON.stringify({ refreshToken: rt }),
      });
    }
  </script>
</body>
</html>
