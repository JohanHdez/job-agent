<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Agent — Running...</title>
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>" />
  <style>
    /* ── Progress-specific styles ───────────────────────────────── */
    .progress-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      margin-bottom: 1.5rem;
    }

    /* Progress bar */
    .progress-bar-track {
      height: 8px;
      background: var(--bg-elevated);
      border-radius: 99px;
      overflow: hidden;
      margin: 1.5rem 0 0.5rem;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #818cf8);
      border-radius: 99px;
      transition: width 0.4s ease;
      width: 0%;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }
    .progress-pct {
      font-weight: 600;
      color: var(--primary);
    }

    /* Step list */
    .step-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .step-item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.625rem 0.875rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      background: transparent;
      transition: background 0.2s;
    }
    .step-item.active  { background: rgba(99,102,241,0.08); }
    .step-item.done    { color: var(--success); }
    .step-item.error   { color: var(--danger); background: rgba(239,68,68,0.07); }
    .step-item.warning { color: #f59e0b; }

    .step-icon {
      font-size: 1rem;
      line-height: 1.4;
      flex-shrink: 0;
    }
    .step-text { line-height: 1.5; }

    /* Log panel */
    .log-panel {
      background: #0f1117;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      color: #94a3b8;
      max-height: 220px;
      overflow-y: auto;
      margin-top: 1rem;
    }
    .log-line { line-height: 1.7; }
    .log-line.info    { color: #60a5fa; }
    .log-line.success { color: #4ade80; }
    .log-line.warn    { color: #fbbf24; }
    .log-line.error   { color: #f87171; }

    /* Done state */
    .done-banner {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 2rem;
      text-align: center;
    }
    .done-banner.visible { display: flex; }
    .done-icon { font-size: 3.5rem; }
    .done-title { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); }
    .done-subtitle { color: var(--text-secondary); font-size: 0.9rem; }

    .btn-report {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
      margin-top: 0.5rem;
    }
    .btn-report:hover { opacity: 0.88; }

    .spinner {
      display: inline-block;
      width: 1rem;
      height: 1rem;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 0.25rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="page-wrapper">

  <header class="page-header">
    <a class="logo" href="index.html">
      <div class="logo-icon">🤖</div>
      <span class="logo-text">Job Agent</span>
    </a>
    <span class="header-badge" id="status-badge">Running...</span>
  </header>

  <main class="main-content">
    <h1 class="page-title">Agent <span>Progress</span></h1>
    <p class="page-description" id="status-description">
      The agent is running — searching jobs and applying on your behalf.
    </p>

    <!-- Progress bar card -->
    <div class="progress-card" id="progress-card">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <div class="progress-label">
        <span id="progress-step-label">Initializing...</span>
        <span class="progress-pct" id="progress-pct">0%</span>
      </div>

      <!-- Step list -->
      <ul class="step-list" id="step-list"></ul>

      <!-- Log panel -->
      <div class="log-panel" id="log-panel"></div>
    </div>

    <!-- Done banner -->
    <div class="done-banner" id="done-banner">
      <div class="done-icon" id="done-icon">✅</div>
      <div class="done-title" id="done-title">Session Complete!</div>
      <div class="done-subtitle" id="done-subtitle">Your report is ready.</div>
      <a href="report.html" class="btn-report" id="view-report-btn">
        📊 View Report
      </a>
    </div>

  </main>

  <footer class="page-footer">
    <p>Job Agent · ⚠️ Use responsibly. Respect the Terms of Service.</p>
  </footer>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="assets/progress.js"></script>
</body>
</html>
