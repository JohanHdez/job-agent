name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs on the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. TypeScript zero errors ──────────────────────────────────────────────
  typecheck:
    name: TypeScript (zero errors)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages/core
        run: npm run build -w packages/core

      - name: Build packages/logger
        run: npm run build -w packages/logger

      - name: Typecheck all workspaces
        run: npm run typecheck

  # ── 2. Jest coverage >= 70% ────────────────────────────────────────────────
  test:
    name: Jest (coverage >= 70%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages/core
        run: npm run build -w packages/core

      - name: Build packages/logger
        run: npm run build -w packages/logger

      - name: Run Jest with coverage
        run: npm run test:cov -w @job-agent/api

  # ── 3. Secret scan (gitleaks) ──────────────────────────────────────────────
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: zricethezav/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
